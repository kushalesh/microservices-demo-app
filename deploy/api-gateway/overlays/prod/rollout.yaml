# Argo Rollouts canary spec, applied alongside the Helm-rendered Deployment in prod.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-gateway-canary
  namespace: app-prod
spec:
  replicas: 6
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels:
      app.kubernetes.io/name: microservices-app
      app.kubernetes.io/instance: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: microservices-app
        app.kubernetes.io/instance: api-gateway
    spec:
      containers:
        - name: microservices-app
          image: ghcr.io/kushalesh/api-gateway:v1.0.0
          ports: [{ containerPort: 8080 }]
